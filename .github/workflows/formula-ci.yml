name: Formula CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-26]
        include:
          - os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - name: Clean Homebrew state
        run: brew test-bot --only-cleanup-before

      - name: Check Homebrew setup
        run: brew test-bot --only-setup

      - name: Check tap syntax
        run: brew test-bot --only-tap-syntax

      - name: Check formula style
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        run: brew style Formula/trustcheck.rb Formula/pi-doctor.rb

      - name: Install trustcheck formula from source
        run: brew install --build-from-source Halfblood-Prince/tap/trustcheck

      - name: Run trustcheck formula test
        run: brew test Halfblood-Prince/tap/trustcheck

      - name: Install pi-doctor formula
        if: matrix.os == 'ubuntu-latest'
        run: brew install Halfblood-Prince/tap/pi-doctor

      - name: Run pi-doctor formula test
        if: matrix.os == 'ubuntu-latest'
        run: brew test Halfblood-Prince/tap/pi-doctor
